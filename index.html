<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ريم ❤️</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Scheherazade+New&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Scheherazade New', serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #f5e6ca;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 4px solid rgba(255,255,255,0.2);
        }

        .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 32px;
            color: #f8d49d;
            font-family: 'Amiri', serif;
        }

        #text {
            font-size: 22px;
            line-height: 2.2;
            min-height: 220px;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #c9a66b;
            color: #1e1e2f;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e6c48f;
        }

        #surprise {
            margin-top: 15px;
            display: none;
            font-size: 20px;
            color: #f8d49d;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="image">
        <img src="reem.jpeg" alt="ريم">
    </div>

    <h1></h1>

    <div id="text"></div>


</div>

<script>
    const text = `أنا مش بعمل كده عشان تقولي حاجة،
ومش مستني رد منك،
بس قولت يمكن تفرحك.

عايز أقولك إنك غالية عندي جدًا،
ونفسي أشوفك أسعد حد في الدنيا.

وأشوفك مهندسة زي ما انتي عايزة،
وأوعدك إني هدعمك في ده دايمًا.

وكمان عايز أقولك بكل ما تحملها الكلمه من  معنى،
إنك أغلى حد عندي،
وهفضل دايمًا شايفك أجمل واحدة.

وأتمنى تبقي مبسوطة دايمًا.`;

    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            document.getElementById("text").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 40);
        }
    }

    function showMessage() {
        document.getElementById("surprise").style.display = "block";
    }

    typeWriter();
</script>

</body>
</html>
